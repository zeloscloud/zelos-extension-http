name = "HTTP"
version = "0.1.0"
description = "HTTP/REST API polling extension for Zelos - monitor and interact with REST endpoints"
author = "Zelos"
repository = "https://github.com/zeloscloud/zelos-extension-http"
homepage = "https://github.com/zeloscloud/zelos-extension-http"
keywords = ["http", "rest", "api", "iot", "monitoring"]
categories = ["IoT", "Networking", "Monitoring"]

icon = "assets/icon.svg"
readme = "README.md"

[zelos]
version = ">=25.0.22-0"

[config]
schema = "config.schema.json"

[runtime]
type = "python"
entry = "main.py"
python_version = "3.11"

[stop]
grace_seconds = 10
